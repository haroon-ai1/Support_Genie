<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupportGenie — Customer Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --first-color: hsl(219, 96%, 56%);
    --first-color-alt: hsl(219, 96%, 50%);
    --first-color-light: hsl(219, 96%, 96%);
    --title-color: hsl(219, 20%, 15%);
    --text-color: hsl(219, 12%, 35%);
    --text-color-light: hsl(219, 8%, 55%);
    --body-color: hsl(0, 0%, 100%);
    --container-color: hsl(219, 25%, 98%);
    --border-color: hsl(219, 15%, 90%);
    --success: hsl(142, 71%, 45%);
    --error: hsl(0, 72%, 51%);
    --shadow: 0 4px 20px hsl(219, 30%, 15%, 0.06);
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--body-color);
    color: var(--text-color);
    font-family: 'Poppins', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .shell {
    width: 100%;
    max-width: 820px;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 0 1.5rem;
  }

  header {
    display: flex;
    align-items: center;
    gap: 0.875rem;
    padding: 1.5rem 0.25rem 1.25rem;
    border-bottom: 1px solid var(--border-color);
  }
  #brand-logo {
    width: 42px; height: 42px;
    border-radius: 0.625rem;
    background: var(--first-color);
    color: #ffffff;
    display: grid; place-items: center;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.01em;
    overflow: hidden;
    flex-shrink: 0;
  }
  #brand-logo img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .brand-text { display: flex; flex-direction: column; min-width: 0; }
  #brand-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--title-color);
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  #brand-subtitle {
    font-size: 13px;
    color: var(--text-color-light);
    font-weight: 400;
    line-height: 1.3;
  }
  header .status {
    margin-left: auto;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--text-color-light);
    display: flex; align-items: center; gap: 6px;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 0.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border-color) transparent;
  }
  #chat::-webkit-scrollbar { width: 8px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

  .msg {
    max-width: 82%;
    line-height: 1.6;
    font-size: 14.5px;
    padding: 0.75rem 0.9rem;
    border-radius: 0.75rem;
    opacity: 0;
    transform: translateY(6px);
    animation: msg-in 260ms var(--ease) forwards;
    box-shadow: var(--shadow);
  }
  @keyframes msg-in {
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--first-color-light);
    color: var(--title-color);
    border: 1px solid hsl(219, 96%, 92%);
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--container-color);
    border: 1px solid var(--border-color);
    color: var(--text-color);
  }
  .msg.bot.handoff { border-color: var(--error); }

  .telemetry {
    margin-top: 0.625rem;
    padding-top: 0.625rem;
    border-top: 1px solid var(--border-color);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--text-color-light);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }
  .conf-bar {
    width: 64px; height: 5px;
    background: var(--border-color);
    border-radius: 3px;
    overflow: hidden;
  }
  .conf-fill {
    height: 100%;
    background: var(--first-color);
    border-radius: 3px;
  }
  .handoff .conf-fill { background: var(--error); }
  .src-chip {
    background: var(--body-color);
    border: 1px solid var(--border-color);
    border-radius: 0.375rem;
    padding: 2px 8px;
    color: var(--text-color-light);
  }
  .handoff-flag {
    color: var(--error);
    font-weight: 500;
  }

  .typing { display: inline-flex; gap: 5px; padding: 4px 2px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-color-light);
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 60%, 100% { opacity: 0.25; } 30% { opacity: 1; } }

  form {
    display: flex;
    gap: 0.625rem;
    padding: 1rem 0.25rem 1.25rem;
    border-top: 1px solid var(--border-color);
  }
  input[type="text"] {
    flex: 1;
    background: var(--body-color);
    border: 1px solid var(--border-color);
    border-radius: 0.5rem;
    padding: 0.7rem 0.9rem;
    color: var(--title-color);
    font: inherit;
    font-size: 14.5px;
    transition: border-color 150ms, background-color 150ms;
  }
  input[type="text"]::placeholder { color: var(--text-color-light); }
  input[type="text"]:focus {
    outline: 2px solid var(--first-color);
    outline-offset: -1px;
    border-color: transparent;
  }
  button {
    background: var(--first-color);
    color: #ffffff;
    border: none;
    border-radius: 0.5rem;
    padding: 0 1.25rem;
    font: inherit;
    font-weight: 500;
    font-size: 14.5px;
    cursor: pointer;
    transition: background-color 150ms, color 150ms;
  }
  button:hover { background: var(--first-color-alt); }
  button:focus-visible {
    outline: 2px solid var(--first-color);
    outline-offset: 2px;
  }
  button:disabled {
    opacity: 0.55;
    cursor: default;
    background: var(--first-color);
  }

  .footnote {
    text-align: center;
    font-size: 12px;
    color: var(--text-color-light);
    padding: 0 0 1.25rem;
  }
  .footnote a {
    color: var(--text-color-light);
    text-decoration: none;
    border-bottom: 1px solid var(--border-color);
    transition: color 150ms, border-color 150ms;
  }
  .footnote a:hover { color: var(--title-color); border-bottom-color: var(--text-color-light); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    .msg { opacity: 1; transform: none; }
    .typing span { animation: none; opacity: 0.6; }
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div id="brand-logo">SG</div>
    <div class="brand-text">
      <span id="brand-name">SupportGenie</span>
      <span id="brand-subtitle">Customer Support</span>
    </div>
    <div class="status"><span class="dot"></span>online</div>
  </header>

  <div id="chat" aria-live="polite"></div>

  <form id="ask-form">
    <input type="text" id="question" placeholder="Ask about orders, warranty, shipping, payments…"
           autocomplete="off" maxlength="500" aria-label="Your question">
    <button type="submit" id="send">Send</button>
  </form>

  <p class="footnote">Powered by SupportGenie · <a href="/admin">view admin</a></p>
</div>

<script>
const chat = document.getElementById("chat");
const form = document.getElementById("ask-form");
const input = document.getElementById("question");
const sendBtn = document.getElementById("send");
const brandNameEl = document.getElementById("brand-name");
const brandSubtitleEl = document.getElementById("brand-subtitle");
const brandLogoEl = document.getElementById("brand-logo");

function scrollToLatest() {
  const last = chat.lastElementChild;
  if (last) last.scrollIntoView({ behavior: "smooth", block: "end" });
}

function addUser(text) {
  const el = document.createElement("div");
  el.className = "msg user";
  el.textContent = text;
  chat.appendChild(el);
  scrollToLatest();
}

function addTyping() {
  const el = document.createElement("div");
  el.className = "msg bot";
  el.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
  chat.appendChild(el);
  scrollToLatest();
  return el;
}

function renderBot(el, data) {
  el.classList.toggle("handoff", data.handoff);
  el.textContent = data.answer;

  if (data.mode === "conversational") {
    scrollToLatest();
    return;
  }

  const strip = document.createElement("div");
  strip.className = "telemetry";
  const conf = typeof data.confidence === "number" ? data.confidence : 0;
  const pct = Math.max(0, Math.min(1, conf)) * 100;

  let html = '<span>conf ' + conf.toFixed(3) + '</span>' +
             '<span class="conf-bar"><span class="conf-fill" style="width:' + pct + '%"></span></span>';
  if (data.handoff) {
    html += '<span class="handoff-flag">↪ human handoff</span>';
  } else {
    for (const s of data.sources) {
      html += '<span class="src-chip">' + s.source + ' · ' + s.score.toFixed(2) + '</span>';
    }
  }
  strip.innerHTML = html;
  el.appendChild(strip);
  scrollToLatest();
}

function applyBranding(b) {
  brandNameEl.textContent = b.brand_name;
  brandSubtitleEl.textContent = b.subtitle || "";
  document.title = b.brand_name + " — Customer Support";
  if (b.logo_mode === "image" && b.logo_url) {
    brandLogoEl.innerHTML = '';
    brandLogoEl.style.background = "transparent";
    const img = document.createElement("img");
    img.src = b.logo_url;
    img.alt = b.brand_name;
    brandLogoEl.appendChild(img);
  } else {
    brandLogoEl.innerHTML = '';
    brandLogoEl.style.background = b.logo_color || "var(--first-color)";
    brandLogoEl.textContent = b.logo_initials || b.brand_name.slice(0, 2).toUpperCase();
  }
  return b;
}

function greet(brandName) {
  const el = document.createElement("div");
  el.className = "msg bot";
  el.textContent = "Hi! I'm the " + brandName + " assistant. Ask me anything about our products, services, or policies.";
  chat.appendChild(el);
}

async function init() {
  let branding = {
    brand_name: "SupportGenie",
    subtitle: "Customer Support",
    logo_mode: "initials",
    logo_initials: "SG",
    logo_color: "hsl(219, 96%, 56%)",
    logo_url: "",
  };
  try {
    const res = await fetch("/api/branding");
    if (res.ok) branding = await res.json();
  } catch (_) { /* use defaults */ }
  applyBranding(branding);
  greet(branding.brand_name);
}
init();

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const q = input.value.trim();
  if (!q) return;
  addUser(q);
  input.value = "";
  sendBtn.disabled = true;
  const pending = addTyping();
  try {
    const res = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q }),
    });
    if (!res.ok) throw new Error("Request failed: " + res.status);
    renderBot(pending, await res.json());
  } catch (err) {
    pending.textContent = "Something went wrong reaching the server. Try again in a moment.";
    pending.classList.add("handoff");
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
});
</script>
</body>
</html>
